services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: student-mara-db
    environment:
      SA_PASSWORD: "ConcertTicket@2024"
      ACCEPT_EULA: "Y"
    volumes:
      - sqldata:/var/opt/mssql
    expose:
      - "1433"
    networks:
      - studlab_net

  api:
    container_name: student-mara-api
    build:
      context: .
      dockerfile: Dockerfile.api
    expose:
      - "8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=student-mara-db;Database=ConcertTicketPlatformDb;User Id=sa;Password=ConcertTicket@2024;TrustServerCertificate=True;
      - Jwt__Key=SuperSecretKey_ConcertTicket_2024_MinLength32Chars
      - Jwt__Issuer=ConcertTicketAPI
      - Jwt__Audience=ConcertTicketWeb
    depends_on:
      - db
    networks:
      - studlab_net

  web:
    container_name: student-mara-web
    build:
      context: .
      dockerfile: Dockerfile.web
    expose:
      - "80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=80
      - ConnectionStrings__DefaultConnection=Server=student-mara-db;Database=ConcertTicketPlatformDb;User Id=sa;Password=ConcertTicket@2024;TrustServerCertificate=True;
      - ApiBaseUrl=http://student-mara-api:8080/
      - ApiPublicUrl=
    depends_on:
      - api
    networks:
      - studlab_net

networks:
  studlab_net:
    external: true

volumes:
  sqldata:
